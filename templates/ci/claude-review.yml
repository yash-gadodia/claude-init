# Claude Code PR Review
# Automatically reviews pull requests using Claude Code
# Requires: ANTHROPIC_API_KEY secret set in repo settings
#
# To install: copy this file to .github/workflows/claude-review.yml

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6-20250627
          # Uncomment to use a custom review prompt:
          # direct_prompt: "Review this PR for bugs, security issues, and convention violations. Be specific with file:line references."
